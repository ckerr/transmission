name: Code Style
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  formatting-check:
    name: Formatting Check
    runs-on: ubuntu-latest
    steps:
      - name: Get Source
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Get Deps
        run: |
          sudo apt-get install clang-format-12 npm yarn
      - name: Check
        working-directory: .
        run: |
          ./code_style.sh
          git diff --exit-code
